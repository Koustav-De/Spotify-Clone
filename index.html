<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="https://open.spotifycdn.com/cdn/images/favicon32.b64ecc03.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="utility.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <title>Spotify Clone</title>
</head>

<body>
    <div class="container flex">

        <!-- Left box -->
        <div class="left-box">
            <div class="home">
                <div class="close">
                    <img src="close.svg" alt="">
                </div>
                <div class="logo"><img class="invert" src="logo.svg" alt="Spotify">Spotify</div>
                <ul>
                    <li><img class="invert" src="home.svg" alt="">Home</li>
                    <li><img class="invert" src="search.svg" alt="">Search</li>
                </ul>
            </div>

            <!-- Library -->
            <div class="library">
                <div class="heading">
                    <h2>Your Library</h2>
                    <img class="invert" src="plus.svg" alt="">
                </div>

                <!-- Songlist -->
                <div class="songlist">
                    <ul>
                        <!-- <li>
                            <img class="invert" src="music.svg" alt="">
                            <div class="info">
                                <div>Song Name</div>
                                <div>Song Artist</div>
                            </div>
                            <div class="playnow">
                                <span>Play Now</span>
                                <img id="playBtn" src="play.svg">
                            </div>
                        </li> -->
                    </ul>
                </div>

                <!-- Footer -->
                <div class="footer">
                    <div><a href="https://www.spotify.com/in-en/legal/"><span>Legal</span></a></div>
                    <div><a href="https://www.spotify.com/in-en/safetyandprivacy/"><span>Safety &amp; Privacy
                                Center</span></a></div>
                    <div><a href="https://www.spotify.com/in-en/legal/privacy-policy/"><span>Privacy Policy</span></a>
                    </div>
                    <div><a href="https://www.spotify.com/in-en/legal/cookies-policy/"><span>Cookies</span></a></div>
                    <div><a href="https://www.spotify.com/in-en/legal/privacy-policy/#s3"><span>About Ads</span></a>
                    </div>
                    <div><a href="https://www.spotify.com/in-en/accessibility/"><span>Accessibility</span></a></div>
                </div>
            </div>
        </div>

        <!-- Right box -->
        <div class="right-box">
            <div class="header">

                <!-- Navbar -->
                <div class="nav">
                    <img src="menu.svg" class="hamburger" alt="">
                    <div class="flex justify items">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"
                            color="currentColor" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"
                            stroke-linejoin="round">
                            <path d="M17 4L8.66943 10.0405C6.44352 11.6545 6.44353 12.3455 8.66943 13.9595L17 20" />
                        </svg>
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"
                            color="currentColor" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"
                            stroke-linejoin="round">
                            <path d="M7 4L15.3306 10.0405C17.5565 11.6545 17.5565 12.3455 15.3306 13.9595L7 20" />
                        </svg>
                    </div>
                </div>

                <!-- Buttons -->
                <div class="buttons">
                    <button class="sign">Sign up</button>
                    <button class="login">Log in</button>
                </div>
            </div>
            <div class="spotify">
                <h1 style="padding: 0px 10px">Spotify Playlists</h1>

                <!-- Card container -->
                <div class="cardContainer">
                    <div data-folder="Hindi" class="card">
                        <div class="play">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <circle cx="12" cy="12" r="10" />
                                <path
                                    d="M9.5 11.1998V12.8002C9.5 14.3195 9.5 15.0791 9.95576 15.3862C10.4115 15.6932 11.0348 15.3535 12.2815 14.6741L13.7497 13.8738C15.2499 13.0562 16 12.6474 16 12C16 11.3526 15.2499 10.9438 13.7497 10.1262L12.2815 9.32594C11.0348 8.6465 10.4115 8.30678 9.95576 8.61382C9.5 8.92086 9.5 9.6805 9.5 11.1998Z"
                                    fill="currentColor" />
                            </svg>
                        </div>
                        <img src="https://mosaic.scdn.co/300/ab67616d00001e0252fe6875028c892308ffc2f7ab67616d00001e02c40a3da79b226c3bdfa971a5ab67616d00001e02c7f2f9a5c03ae68feb7ab9ccab67616d00001e02e46104d82a7ca20d7efc7d97"
                            alt="">
                        <h2>Hindi</h2>
                        <p>क, ख, ग, घ, ङ</p>
                    </div>
                    <div data-folder="Bengali" class="card">
                        <div class="play">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <circle cx="12" cy="12" r="10" />
                                <path
                                    d="M9.5 11.1998V12.8002C9.5 14.3195 9.5 15.0791 9.95576 15.3862C10.4115 15.6932 11.0348 15.3535 12.2815 14.6741L13.7497 13.8738C15.2499 13.0562 16 12.6474 16 12C16 11.3526 15.2499 10.9438 13.7497 10.1262L12.2815 9.32594C11.0348 8.6465 10.4115 8.30678 9.95576 8.61382C9.5 8.92086 9.5 9.6805 9.5 11.1998Z"
                                    fill="currentColor" />
                            </svg>
                        </div>
                        <img src="https://mosaic.scdn.co/300/ab67616d00001e024167b218fa999b6083380a8aab67616d00001e0265235d93e58b502f0e08200fab67616d00001e02cf0da7b9ad62974142541a91ab67616d00001e02da6c3300119ce7b09701c2ff"
                            alt="">
                        <h2>Bengali</h2>
                        <p>ক, খ, গ, ঘ, ঙ</p>
                    </div>
                    <div data-folder="English" class="card">
                        <div class="play">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <circle cx="12" cy="12" r="10" />
                                <path
                                    d="M9.5 11.1998V12.8002C9.5 14.3195 9.5 15.0791 9.95576 15.3862C10.4115 15.6932 11.0348 15.3535 12.2815 14.6741L13.7497 13.8738C15.2499 13.0562 16 12.6474 16 12C16 11.3526 15.2499 10.9438 13.7497 10.1262L12.2815 9.32594C11.0348 8.6465 10.4115 8.30678 9.95576 8.61382C9.5 8.92086 9.5 9.6805 9.5 11.1998Z"
                                    fill="currentColor" />
                            </svg>
                        </div>
                        <img src="https://mosaic.scdn.co/300/ab67616d00001e021192ae62dfe52262a3cc3fedab67616d00001e021b11100917617bd2a75396afab67616d00001e02459d675aa0b6f3b211357370ab67616d00001e02626fb1736f04466054ff7dd4"
                            alt="">
                        <h2>English</h2>
                        <p>A, B, C, D, E</p>
                    </div>
                </div>

                <!-- Playbar -->
                <div class="playbar">
                    <div class="seekbar">
                        <div class="circle"></div>
                    </div>
                    <div class="songinfo"></div>
                    <div class="songbtn">
                        <img id="previous" src="prev.svg" alt="">
                        <img id="playBtn" src="play.svg" alt="">
                        <img id="next" src="next.svg" alt="">
                    </div>
                    <div class="songtime"></div>
                    <div class="volume">
                        <img id="vol" src="volume.svg" alt="">
                        <input type="range" name="volume" style="height: 5px;">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="Script.js"></script>
</body>

</html>
